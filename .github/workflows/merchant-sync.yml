name: Merchant List Sync (WealthFlow)

# =============================================================================
# Verifies + de-duplicates merchants.json every run, and grows it using YOUR OWN
# /api/ai endpoint (which already holds all 16 AI engine keys in Vercel).
#
# SETUP — one repo VARIABLE, no secret:
#   Settings -> Secrets and variables -> Actions -> Variables:
#     APP_URL = https://<your-app>.vercel.app
#
# WHY THE LAST RUN FAILED: this file said "node Test/merchant-expand.cjs" but the
# folder in the repo is "test/" (lowercase). Linux is case-sensitive, so it was
# MODULE_NOT_FOUND. The step now FINDS the script wherever it lives, so the case
# of the folder can never break it again.
# =============================================================================

on:
  schedule:
    - cron: '0 * * * *'     # hourly (repo is public → Actions minutes are free)
  workflow_dispatch: {}

permissions:
  contents: write

# Its OWN group. Sharing one group with the other bots made GitHub CANCEL queued
# merchant runs (the history showed ~2h gaps instead of hourly). A push race is already
# handled by the rebase-retry loop in the commit step, so the shared group cost runs and
# bought nothing.
concurrency:
  group: merchant-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Locate the engine (case-proof)
        id: find
        run: |
          SCRIPT=""
          for c in test/merchant-expand.cjs Test/merchant-expand.cjs tests/merchant-expand.cjs merchant-expand.cjs; do
            if [ -f "$c" ]; then SCRIPT="$c"; break; fi
          done
          if [ -z "$SCRIPT" ]; then
            SCRIPT=$(find . -maxdepth 3 -name 'merchant-expand.cjs' -not -path './node_modules/*' | head -n1 || true)
          fi
          if [ -z "$SCRIPT" ]; then
            echo "::error::merchant-expand.cjs is not in the repository. Upload it to the repo root (or the test/ folder)."
            exit 1
          fi
          echo "script=$SCRIPT" >> "$GITHUB_OUTPUT"
          echo "using $SCRIPT"

      - name: Expand & verify merchant list
        env:
          SCRIPT: ${{ steps.find.outputs.script }}
          # APP_URL is the ONLY thing you need to set. It points at your own /api/ai,
          # which already holds all 16 AI engine keys in Vercel.
          APP_URL: ${{ vars.APP_URL }}
          # Optional fallback only — leave these unset. They are used solely if APP_URL
          # is missing, and the run works perfectly without them.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL }}
          MERCHANT_BATCH: ${{ vars.MERCHANT_BATCH }}
        run: |
          echo "engine : $SCRIPT ($(wc -c < "$SCRIPT") bytes)"
          echo "APP_URL: ${APP_URL:-<not set — the list can only self-verify, not grow>}"
          node "$SCRIPT" | tee /tmp/merchant.log
          {
            echo "### Merchant List Sync"
            echo ''
            echo '```'
            cat /tmp/merchant.log
            echo '```'
            if [ -f merchants.json ]; then
              echo ''
              echo "**Merchants in the list:** $(node -p "require('./merchants.json').count")"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Commit if the list changed
        run: |
          if [ -z "$(git status --porcelain merchants.json)" ]; then
            echo "No changes to merchants.json this run."
            exit 0
          fi
          git config user.name  'WealthFlow Merchant Bot'
          git config user.email 'bot@wealthflow.local'
          git add merchants.json
          git commit -m 'chore(merchants): auto-expand + verify merchant list [skip ci]'
          for i in 1 2 3; do
            if git push; then
              echo "merchants.json updated and pushed."
              exit 0
            fi
            echo "push rejected (attempt $i) — rebasing on the latest default branch"
            git pull --rebase --autostash origin "$GITHUB_REF_NAME" || true
          done
          echo "could not push after 3 attempts — will retry next run"
          exit 1
