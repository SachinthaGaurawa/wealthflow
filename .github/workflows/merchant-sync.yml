name: Merchant Expansion Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  expand-merchants:
    name: Expand and Verify Merchant List
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository codebase
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Locate the engine (case-proof)
        id: find
        run: |
          SCRIPT=""
          for c in test/merchant-expand.cjs Test/merchant-expand.cjs tests/merchant-expand.cjs merchant-expand.cjs; do
            if [ -f "$c" ]; then SCRIPT="$c"; break; fi
          done
          if; then
            SCRIPT=$(find. -maxdepth 3 -name 'merchant-expand.cjs' -not -path './node_modules/*' | head -n1 || true)
          fi
          if; then
            echo "::error::merchant-expand.cjs is not in the repository. Upload it to the repo root (or the test/ folder)."
            exit 1
          fi
          echo "script=$SCRIPT" >> "$GITHUB_OUTPUT"
          echo "Found script at: $SCRIPT"

      - name: Initialize Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Application Dependencies
        run: npm install --no-package-lock || echo "No package.json found, skipping install."

      - name: Expand & verify merchant list
        env:
          SCRIPT: ${{ steps.find.outputs.script }}
          APP_URL: ${{ vars.APP_URL }}
          ANTHROPIC_API_KEY: ${{ vars.ANTHROPIC_API_KEY || secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL }}
          MERCHANT_BATCH: ${{ vars.MERCHANT_BATCH }}
        run: node "$SCRIPT"
