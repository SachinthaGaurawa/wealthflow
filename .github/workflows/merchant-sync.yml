# =============================================================================
# WealthFlow — Merchant List Auto-Sync
# Runs on a schedule with NO human. Every run it VERIFIES + dedupes + sorts the
# merchant list (merchants.json). When an Anthropic key is configured it also
# asks Claude for NEW real Sri-Lankan/global merchants, re-verifies each against
# the taxonomy, and merges the valid ones. Commits only when the file changed,
# which auto-deploys on Vercel — and the app fetches the fresh list on launch.
#
# SETUP (one time, to enable AI growth — verification runs without it):
#   Repo -> Settings -> Secrets and variables -> Actions -> Variables:
#     APP_URL = https://<your-app>.vercel.app     <-- THIS IS ALL YOU NEED.
#   The engine then calls YOUR OWN /api/ai, which already holds every AI key in
#   Vercel. NO new API key, NO new secret. (Optional: ANTHROPIC_API_KEY as a
#   fallback, MERCHANT_BATCH to change the batch size.)
#   Settings -> Actions -> General -> Workflow permissions -> Read and write.
#
# The engine lives at Test/merchant-expand.cjs (a plain Node script; Vercel only
# builds api/*.js as functions, so it never touches the deployment).
# =============================================================================
name: Merchant List Sync (WealthFlow)

on:
  schedule:
    - cron: '0 * * * *'     # every hour — and the app resolves unknown merchants in REAL TIME on every import
  workflow_dispatch: {}      # allow manual runs too

permissions:
  contents: write

concurrency:
  group: merchant-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Expand & verify merchant list
        env:
          APP_URL: ${{ vars.APP_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL }}
          MERCHANT_BATCH: ${{ vars.MERCHANT_BATCH }}
        run: node Test/merchant-expand.cjs
      - name: Commit if the list changed
        run: |
          if [ -n "$(git status --porcelain merchants.json)" ]; then
            git config user.name  'WealthFlow Merchant Bot'
            git config user.email 'bot@wealthflow.local'
            git add merchants.json
            git commit -m 'chore(merchants): auto-expand + verify merchant list [skip ci]'
            git push
            echo 'merchants.json updated and pushed.'
          else
            echo 'No changes to merchants.json this run.'
          fi
