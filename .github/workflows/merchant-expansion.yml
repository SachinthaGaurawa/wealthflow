name: Merchant Expansion Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  expand-merchants:
    name: Expand and Verify Merchant List
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository codebase
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Verify Workspace Structure
        run: |
          ls -la
          echo "Verifying Test directory existence..."
          ls -la Test/ || echo "WARNING: Directory Test/ does not exist. Check case sensitivity."

      - name: Initialize Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # Note: cache: 'npm' has been completely removed to fix the lock file error.

      - name: Expand & verify merchant list
        env:
          APP_URL: ${{ vars.APP_URL }}
          # This successfully grabs your API key from the Variables tab shown in your screenshot
          ANTHROPIC_API_KEY: ${{ vars.ANTHROPIC_API_KEY || secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL }}
          MERCHANT_BATCH: ${{ vars.MERCHANT_BATCH }}
        run: node Test/merchant-expand.cjs
