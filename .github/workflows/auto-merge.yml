name: Auto-merge safe changes (free)

# When an AI-authored (or any) PR passes ALL required checks AND does not touch a
# sensitive path, merge it automatically. Sensitive PRs are skipped here and wait
# for a human (enforced by the risk-gate job + CODEOWNERS review). 100% free.

on:
  pull_request_target:
    types: [labeled, unlabeled, synchronize, opened, reopened]
  check_suite:
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    # only consider PRs explicitly marked safe (e.g. by the AI agent or a rule)
    if: contains(github.event.pull_request.labels.*.name, 'auto-safe')
    steps:
      - name: Enable auto-merge (merges automatically once required checks pass)
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          pull-request-number: ${{ github.event.pull_request.number }}
          merge-method: squash
      # Branch protection still enforces: required status checks (tests + risk-gate)
      # and CODEOWNERS review on sensitive paths. So "auto-safe" can never bypass the
      # gate — if the risk-gate job fails, the merge simply will not happen.
