<!DOCTYPE html>
<html>
<body>
<script>
async function test() {
    const blob = new Blob(["Hello"], {type: "text/plain"});
    const formData = new FormData();
    formData.append('file', blob, 'test.txt');
    try {
        const res = await fetch('https://tmpfiles.org/api/v1/upload', { method: 'POST', body: formData });
        const data = await res.json();
        console.log("tmpfiles success:", data);
        document.body.innerHTML += "<p>tmpfiles success: " + JSON.stringify(data) + "</p>";
    } catch(e) {
        console.error("tmpfiles error", e);
        document.body.innerHTML += "<p>tmpfiles error: " + e.message + "</p>";
    }

    const formData2 = new FormData();
    formData2.append('reqtype', 'fileupload');
    formData2.append('fileToUpload', blob, 'test.txt');
    try {
        const res = await fetch('https://catbox.moe/user/api.php', { method: 'POST', body: formData2 });
        const text = await res.text();
        console.log("catbox success:", text);
        document.body.innerHTML += "<p>catbox success: " + text + "</p>";
    } catch(e) {
        console.error("catbox error", e);
        document.body.innerHTML += "<p>catbox error: " + e.message + "</p>";
    }
}
test();
</script>
</body>
</html>
