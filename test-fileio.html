<!DOCTYPE html>
<html>
<body>
<script>
async function test() {
    const blob = new Blob(["Hello File.io"], {type: "application/pdf"});
    const formData = new FormData();
    formData.append('file', blob, 'test.pdf');
    try {
        const res = await fetch('https://file.io', { method: 'POST', body: formData });
        const data = await res.json();
        console.log("file.io success:", data);
        document.body.innerHTML += "<p>file.io success: " + JSON.stringify(data) + "</p>";
    } catch(e) {
        console.error("file.io error", e);
        document.body.innerHTML += "<p>file.io error: " + e.message + "</p>";
    }
}
test();
</script>
</body>
</html>
